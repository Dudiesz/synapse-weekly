tarefa_pesquisa:
  description: >
    Hoje é dia {current_date}. 
    Use a ferramenta de busca para encontrar as 15 notícias mais importantes sobre {topic}.
    
    DIRETRIZES DE BUSCA:
    1. Procure especificamente por termos como 'release', 'announcement', 'breakthrough' e 'new feature'.
    2. Priorize domínios como: techcrunch.com, theverge.com, arstechnica.com, e blogs oficiais (AWS, Google Cloud, OpenAI).
    3. Ignore notícias que sejam puramente sobre 'preço de ações' ou fofocas de CEOs.
    4. Garanta que a data da notícia seja de, no máximo, 7 dias atrás.
  expected_output: >
    Uma lista organizada contendo: Título, um resumo técnico extraído da fonte e a URL original.

tarefa_redacao_jornal:
  description: >
    Sua missão é atuar como um Editor-Chefe crítico. Analise as notícias reais 
    trazidas pelo Scout e selecione as 5 que possuem maior impacto técnico ou social.
    
    DIRETRIZES DE REDAÇÃO:
    1. PROIBIDO explicar "o que é IA" ou definições básicas. O leitor é um estudante de tecnologia.
    2. FOCO NO IMPACTO: Se uma pesquisa saiu, explique o diferencial técnico. Se uma empresa 
       teve falha ou as ações caíram, analise o motivo (ex: gargalo de infraestrutura, erro de ética).
    3. SEM FILTRO COMERCIAL: Não tente "vender" o produto. Se a notícia for ruim, reporte como tal.
    4. ESTRUTURA: Organize em "Avanços Técnicos", "Impacto no Mercado" e "Riscos & Ética".
    5. FIDELIDADE: Use apenas os links e fatos reais da pesquisa.
  expected_output: >
    Um boletim informativo denso e analítico em Markdown, focado em fatos reais e 
    implicações para a carreira dos estudantes.